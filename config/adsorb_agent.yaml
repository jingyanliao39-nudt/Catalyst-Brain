agent_settings:
  provider: "openai"
  version: "gpt-4o"
  base_url: "https://api.huiyan-ai.cn/v1"
  # Network robustness
  llm_timeout: 120
  llm_max_retries: 2
  # Determinism (when supported by provider)
  llm_temperature: 0
  #gnn_model: "checkpoints/eq2_31M_ec4_allmd.pt"  
  gnn_model: "checkpoints/eq2_153M_ec4_allmd.pt"
  #gnn_model: "external_models/dpa/checkpoints/dpa-3.1-3m-ft.pth"
  #gnn_model: "external_models/orb_v3/checkpoints/orb-v3-conservative-inf-mpa-20250404.ckpt"
  #gnn_model: "external_models/grace/GRACE-2L-OMAT-large-ft-AM"
  mode: "llm-guided"
  critic_activate: true
  random_ratio: 0.2
  init_multiplier: 1.5
  num_workers: 8 # 建议: 24GB显存单卡建议 1 个以避免OOM; 如果利用双卡需修改代码分配 device

  # Enforce: 1 structure per LLM description
  num_sites_per_llm: 20

  # Enable iterative closed-loop: 2 candidates per round
  max_rounds: 10

  # Rollback controls
  rollback_patience: 1
  use_result_llm: true
  energy_worsen_threshold: 0.3

  # Strict site_atoms matching
  site_atoms_start_radius: null
  site_atoms_radius_step: 0.2
  site_atoms_max_radius: 4.0

  # When LLM repeats configs, how many regeneration attempts per round
  max_regen_attempts: 4

paths:
  question_path: "reasoning/reasoning.txt"
  knowledge_path: "reasoning/knowledge.txt"
  metadata_path: "data/processed/updated_sid_to_details.pkl"
  bulk_db_path: "fairchem-forked/src/fairchem/data/oc/databases/pkls/bulks.pkl"
  ads_db_path: "fairchem-forked/src/fairchem/data/oc/databases/pkls/adsorbates.pkl"
  save_dir: "results/"
  system_dir: "config/sub"
